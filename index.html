<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe de Hallazgos — Río Loa</title>

    <!-- App instalable (ícono en el celular, abre en Chrome) -->
    <meta name="theme-color" content="#2A5C6E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Hallazgos">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF para exportar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Typo.js: corrector ortográfico (Hunspell en navegador) -->
    <script src="https://cdn.jsdelivr.net/npm/typo-js@1.2.5/typo.js"></script>

    <style>
        body { background-color: #eef2f5; }
        @media print { .no-print { display: none !important; } }
        textarea { resize: vertical; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/plain" id="app-source">
        const { useState, useEffect, useRef } = React;

        // ═══════════════════════════════════════════════════════════════════
        //  LISTAS EDITABLES  —  cambia aquí las zonas, supervisores y CPHS
        //  (escribe los nombres tal cual quieres que aparezcan en el informe)
        // ═══════════════════════════════════════════════════════════════════
        const ZONAS = [
            'Batch House',
            'Área Subterráneo / Bases (Batch House)',
            'Galpón Soda',
            'Planta Molienda (Chancado)',
            'Hornos',
            'Bodega de Despacho / Bodegas',
            'Área de Descarga',
            'Pintado',
            'Corona',
        ];
        // Quién realiza la inspección — agrupado. value = nombre limpio; el rol es solo para mostrar.
        const EQUIPO = [
            { grupo: 'Administración / APR', personas: [
                { n: 'Héctor Arce Matta', r: 'Administrador de Contrato' },
                { n: 'Braulio Sielpe', r: 'APR' },
                { n: 'Víctor Donoso', r: 'APR' },
            ]},
            { grupo: 'Supervisores', personas: [
                { n: 'Edward Miño' },
                { n: 'Sergio Rojas' },
                { n: 'Manuel Fuentes' },
                { n: 'Guillermo Oneto' },
            ]},
            { grupo: 'CPHS', personas: [
                { n: 'Luis Alarcón Morales', r: 'Presidente · Titular' },
                { n: 'Luis Tobar Huerta', r: 'Titular' },
                { n: 'José Robles Soto', r: 'Titular' },
                { n: 'Patricio Chamblas Escobar', r: 'Suplente' },
                { n: 'Desiderio Irala Cuba', r: 'Suplente' },
                { n: 'José Rivas González', r: 'Suplente' },
                { n: 'Claudio Liberona', r: 'Repr. empresa' },
            ]},
        ];
        const CPHS_SET = new Set(EQUIPO.find(g => g.grupo === 'CPHS').personas.map(p => p.n));
        const MOSTRAR_CPHS_EN_PDF = true; // muestra "(CPHS)" junto al nombre en el PDF
        // ═══════════════════════════════════════════════════════════════════

        // ───────────────────────── ICONOS (SVG inline) ─────────────────────────
        const IconBase = ({ children, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Plus = (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
        const Trash2 = (p) => <IconBase {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const Download = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
        const Upload = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;
        const Eye = (p) => <IconBase {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const SpellCheck = (p) => <IconBase {...p}><path d="m6 16 6-12 6 12"/><path d="M8 12h8"/><path d="m16 20 2 2 4-4"/></IconBase>;
        const XCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconBase>;
        const Loader = (p) => <IconBase {...p}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></IconBase>;
        const Camera = (p) => <IconBase {...p}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconBase>;
        const Save = (p) => <IconBase {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>;
        const RotateCcw = (p) => <IconBase {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></IconBase>;
        const Check = (p) => <IconBase {...p}><polyline points="20 6 9 17 4 12"/></IconBase>;
        const Send = (p) => <IconBase {...p}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconBase>;
        const Mail = (p) => <IconBase {...p}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></IconBase>;
        const MessageCircle = (p) => <IconBase {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></IconBase>;
        const ImageIcon = (p) => <IconBase {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
        const Settings = (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>;

        // ───────────────────────── LOGO RÍO LOA (vector) ─────────────────────────
        const TEAL = '#2A5C6E';   // "RIO"
        const BLUE = '#4A90B8';   // "LOA"
        const LogoRioLoa = ({ height = 38 }) => (
            <svg height={height} viewBox="0 0 230 60" xmlns="http://www.w3.org/2000/svg" style={{display:'block'}}>
                <text x="0" y="47" fontFamily="Arial, Helvetica, sans-serif" fontWeight="900" fontSize="54" letterSpacing="-3">
                    <tspan fill={TEAL}>RIO</tspan><tspan fill={BLUE}>LOA</tspan>
                </text>
            </svg>
        );

        // ───────────────────────── CONSTANTES ─────────────────────────
        const STORAGE_KEY = 'rioloa_informe_hallazgos_v1';
        const ESCALA_KEY = 'rioloa_escala';
        const CORREOS = 'bplaza@rioloa.cl,vdonoso@rioloa.cl';
        const MAX_FOTOS = 6;
        // Niveles de tamaño de texto (escala toda la app proporcionalmente)
        const ESCALAS = [
            { id: 'Normal', px: 16 },
            { id: 'Grande', px: 18.5 },
            { id: 'Extra',  px: 21 },
        ];

        const NIVELES = [
            { val: 'ALTO',  bg: '#dc2626', soft: '#fef2f2', border: '#fecaca', text: '#991b1b' },
            { val: 'MEDIO', bg: '#d97706', soft: '#fffbeb', border: '#fde68a', text: '#92400e' },
            { val: 'BAJO',  bg: '#16a34a', soft: '#f0fdf4', border: '#bbf7d0', text: '#166534' },
        ];
        const nivelInfo = (v) => NIVELES.find(n => n.val === v) || null;

        // Términos propios / técnicos que el corrector NO debe marcar
        const WHITELIST = new Set([
            'rio','loa','rioloa','cristalerías','cristalerias','chile','batch','house','molienda',
            'donoso','víctor','victor','peñaflor','maxisaco','maxisacos','chute','conchuela','cromita',
            'izaje','citófono','citofono','escotilla','señalética','señaletica','epp','sst','oal','reg','prm',
            'cphs','mutual','peatonal','prevencionista','rioloa','sa','maquinarias','construcciones',
        ]);

        const hoyISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

        const defaultData = () => ({
            codigo: 'REG-PRM',
            version: '01',
            fechaDoc: new Date().toLocaleDateString('es-CL'),
            logo: null, // null = se usa el logo vectorial embebido
            // 1. Datos generales
            mandante: 'Cristalerías de Chile',
            ejecutora: 'Maquinarias y Construcciones Río Loa S.A.',
            area: '',
            fechaInspeccion: hoyISO(),
            elaboradoPor: '',
            // 2. Objetivo
            objetivo: 'Informar a la mandante las condiciones observadas en terreno durante la inspección, con el propósito de proponer las acciones de mejora necesarias para prevenir incidentes.',
            // 3. Hallazgos
            hallazgos: [],
            // 4. Cierre
            observacionesGenerales: '',
            firma: null, // firma dibujada del responsable del levantamiento
        });

        const nuevoHallazgo = () => ({ id: Date.now() + Math.floor(Math.random()*1000), nivel: '', ubicacion: '', situacion: '', fotos: [], solucion: '' });

        // ───────────────────────── HELPERS ─────────────────────────
        const inAppBrowser = () => /(FBAN|FBAV|Instagram|Line\/|WhatsApp|; wv\))/i.test(navigator.userAgent || '');
        const fileToDataURL = (file, cb) => {
            const r = new FileReader();
            r.onloadend = () => cb(r.result);
            r.readAsDataURL(file);
        };
        // Reescala/comprime fotos del celular para no exceder el almacenamiento ni inflar el PDF
        const compressImage = (file, cb, maxDim = 1280, quality = 0.72) => {
            const toCanvas = (src, w0, h0) => {
                let w = w0, h = h0;
                if (w > maxDim || h > maxDim) {
                    if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
                    else { w = Math.round(w * maxDim / h); h = maxDim; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
                ctx.drawImage(src, 0, 0, w, h);
                return canvas.toDataURL('image/jpeg', quality);
            };
            const viaReader = () => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => { try { cb(toCanvas(img, img.width, img.height)); } catch (e) { cb(ev.target.result); } };
                    img.onerror = () => cb(ev.target.result);
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            // createImageBitmap con 'from-image' respeta la orientación EXIF (fotos verticales del celular)
            if (window.createImageBitmap) {
                createImageBitmap(file, { imageOrientation: 'from-image' })
                    .then(bmp => { try { cb(toCanvas(bmp, bmp.width, bmp.height)); } catch (e) { viaReader(); } if (bmp.close) bmp.close(); })
                    .catch(() => viaReader());
            } else { viaReader(); }
        };
        const imgFormat = (dataUrl) => {
            const m = /^data:image\/(\w+);/.exec(dataUrl || '');
            const f = m ? m[1].toUpperCase() : 'PNG';
            return f === 'JPG' ? 'JPEG' : f;
        };
        const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const matchCase = (orig, repl) => (orig[0] === orig[0].toUpperCase()) ? repl.charAt(0).toUpperCase() + repl.slice(1) : repl;

        // ───────────────────────── COMPONENTE PRINCIPAL ─────────────────────────
        const App = () => {
            const [data, setData] = useState(() => {
                const base = defaultData();
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const saved = { ...base, ...JSON.parse(raw) };
                        saved.hallazgos = (saved.hallazgos || []).map(h => ({ ...h, fotos: h.fotos || (h.foto ? [h.foto] : []) }));
                        return saved;
                    }
                } catch (e) {}
                return base;
            });
            const [saveNote, setSaveNote] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [ajustesOpen, setAjustesOpen] = useState(false);
            const [chromeTip, setChromeTip] = useState(() => inAppBrowser());
            const [escalaIdx, setEscalaIdx] = useState(() => { try { return Math.min(2, Math.max(0, parseInt(localStorage.getItem(ESCALA_KEY) || '0', 10) || 0)); } catch (e) { return 0; } });
            useEffect(() => {
                document.documentElement.style.fontSize = ESCALAS[escalaIdx].px + 'px';
                try { localStorage.setItem(ESCALA_KEY, String(escalaIdx)); } catch (e) {}
            }, [escalaIdx]);

            // Corrector ortográfico
            const spellRef = useRef(null);
            const [spellStatus, setSpellStatus] = useState('idle');
            const [spellResults, setSpellResults] = useState(null);
            const [spellOpen, setSpellOpen] = useState(false);

            // Autoguardado
            useEffect(() => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    setSaveNote('Guardado');
                } catch (e) {
                    try {
                        const light = {
                            ...data, logo: null, firma: null,
                            hallazgos: data.hallazgos.map(h => ({ ...h, fotos: [] })),
                        };
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(light));
                        setSaveNote('Guardado (sin imágenes por tamaño)');
                    } catch (e2) { setSaveNote('No se pudo guardar'); }
                }
            }, [data]);

            const set = (campo, valor) => setData(prev => ({ ...prev, [campo]: valor }));

            // Hallazgos
            const addHallazgo = () => setData(prev => ({ ...prev, hallazgos: [...prev.hallazgos, nuevoHallazgo()] }));
            const updHallazgo = (id, campo, valor) => setData(prev => ({ ...prev, hallazgos: prev.hallazgos.map(h => h.id === id ? { ...h, [campo]: valor } : h) }));
            const delHallazgo = (id) => { if (confirm('¿Eliminar este hallazgo?')) setData(prev => ({ ...prev, hallazgos: prev.hallazgos.filter(h => h.id !== id) })); };
            const moveHallazgo = (id, dir) => setData(prev => {
                const arr = [...prev.hallazgos];
                const i = arr.findIndex(h => h.id === id);
                const j = i + dir;
                if (i < 0 || j < 0 || j >= arr.length) return prev;
                [arr[i], arr[j]] = [arr[j], arr[i]];
                return { ...prev, hallazgos: arr };
            });

            const addFotoHallazgo = (id, dataUrl) => setData(prev => ({ ...prev, hallazgos: prev.hallazgos.map(h => h.id === id ? { ...h, fotos: [...(h.fotos || []), dataUrl].slice(0, MAX_FOTOS) } : h) }));
            const delFotoHallazgo = (id, idx) => setData(prev => ({ ...prev, hallazgos: prev.hallazgos.map(h => h.id === id ? { ...h, fotos: (h.fotos || []).filter((_, k) => k !== idx) } : h) }));

            const limpiarTodo = () => {
                if (confirm('¿Borrar todo el informe y empezar de cero? Esta acción no se puede deshacer.')) {
                    setData(defaultData());
                    setSpellResults(null); setSpellOpen(false);
                }
            };

            const copiarEnlace = async () => {
                try { await navigator.clipboard.writeText(location.href); alert('Enlace copiado. Ábrelo en Chrome.'); }
                catch (e) { prompt('Copia este enlace y ábrelo en Chrome:', location.href); }
            };

            // ─────────── CORRECTOR ORTOGRÁFICO ───────────
            const cargarDiccionario = async () => {
                if (spellRef.current) return spellRef.current;
                setSpellStatus('loading');
                try {
                    const [aff, dic] = await Promise.all([
                        fetch('https://cdn.jsdelivr.net/npm/dictionary-es@4/index.aff').then(r => r.text()),
                        fetch('https://cdn.jsdelivr.net/npm/dictionary-es@4/index.dic').then(r => r.text()),
                    ]);
                    const t = new Typo('es', aff, dic, { platform: 'any' });
                    spellRef.current = t;
                    setSpellStatus('ready');
                    return t;
                } catch (e) {
                    console.error(e);
                    setSpellStatus('error');
                    return null;
                }
            };

            const checkText = (dict, text) => {
                const out = [];
                const seen = new Set();
                const tokens = (text || '').match(/[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]{3,}/g) || [];
                tokens.forEach(tok => {
                    const low = tok.toLowerCase();
                    if (seen.has(low)) return;
                    if (WHITELIST.has(low)) return;
                    if (tok === tok.toUpperCase() && tok.length <= 4) return;
                    const cap = low.charAt(0).toUpperCase() + low.slice(1);
                    if (dict.check(tok) || dict.check(low) || dict.check(cap)) return;
                    seen.add(low);
                    out.push({ word: tok, suggestions: (dict.suggest(tok) || []).slice(0, 4) });
                });
                return out;
            };

            const camposTexto = () => {
                const arr = [];
                data.hallazgos.forEach((h, i) => {
                    arr.push({ id: `h${h.id}-ubic`, label: `Hallazgo N°${i+1} · Ubicación`, get: () => h.ubicacion, setter: (v) => updHallazgo(h.id, 'ubicacion', v) });
                    arr.push({ id: `h${h.id}-sit`,  label: `Hallazgo N°${i+1} · Situación observada`, get: () => h.situacion, setter: (v) => updHallazgo(h.id, 'situacion', v) });
                    arr.push({ id: `h${h.id}-sol`,  label: `Hallazgo N°${i+1} · Solución propuesta`, get: () => h.solucion, setter: (v) => updHallazgo(h.id, 'solucion', v) });
                });
                arr.push({ id: 'obs', label: 'Observaciones generales', get: () => data.observacionesGenerales, setter: (v) => set('observacionesGenerales', v) });
                return arr;
            };

            const revisarOrtografia = async () => {
                setSpellOpen(true);
                const dict = await cargarDiccionario();
                if (!dict) return;
                const campos = camposTexto();
                const res = [];
                let total = 0;
                campos.forEach(c => {
                    const issues = checkText(dict, c.get());
                    if (issues.length) { res.push({ id: c.id, label: c.label, issues, setter: c.setter, get: c.get }); total += issues.length; }
                });
                setSpellResults({ total, campos: res });
            };

            const aplicarCorreccion = (campo, wrong, right) => {
                const re = new RegExp('\\b' + escapeRegex(wrong) + '\\b', 'gi');
                const nuevo = campo.get().replace(re, (m) => matchCase(m, right));
                campo.setter(nuevo);
                setSpellResults(prev => {
                    if (!prev) return prev;
                    const dict = spellRef.current;
                    const campos = prev.campos.map(c => {
                        if (c.id !== campo.id) return c;
                        const issues = dict ? checkText(dict, nuevo) : c.issues.filter(it => it.word.toLowerCase() !== wrong.toLowerCase());
                        return { ...c, issues };
                    }).filter(c => c.issues.length);
                    const total = campos.reduce((a, c) => a + c.issues.length, 0);
                    return { total, campos };
                });
            };

            // ─────────── GENERAR PDF ───────────
            const buildPDF = () => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const PW = 210, PH = 297, ML = 14, MR = 14, MB = 14;
                const CW = PW - ML - MR;
                let curY = 0;

                const drawLogoText = () => {
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(20);
                    pdf.setTextColor(42, 92, 110); pdf.text('RIO', ML, 15);
                    const w = pdf.getTextWidth('RIO');
                    pdf.setTextColor(74, 144, 184); pdf.text('LOA', ML + w, 15);
                };
                const drawHeader = () => {
                    if (data.logo) {
                        try {
                            const pr = pdf.getImageProperties(data.logo);
                            const lh = 12, lw = Math.min(lh * (pr.width / pr.height), 55);
                            pdf.addImage(data.logo, imgFormat(data.logo), ML, 6, lw, lh);
                        } catch (e) { drawLogoText(); }
                    } else { drawLogoText(); }
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(13); pdf.setTextColor(40, 40, 40);
                    pdf.text('INFORME DE HALLAZGOS', PW / 2, 12, { align: 'center' });
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(110, 110, 110);
                    pdf.text('Inspección de Seguridad en Terreno', PW / 2, 17, { align: 'center' });
                    pdf.setFontSize(7); pdf.setTextColor(90, 90, 90);
                    pdf.text(`Código: ${data.codigo || '—'}`, PW - MR, 9, { align: 'right' });
                    pdf.text(`Versión: ${data.version || '—'}`, PW - MR, 13, { align: 'right' });
                    pdf.text(`Fecha: ${data.fechaDoc || '—'}`, PW - MR, 17, { align: 'right' });
                    pdf.setDrawColor(42, 92, 110); pdf.setLineWidth(0.6); pdf.line(ML, 22, PW - MR, 22);
                    curY = 29;
                };
                const newPage = () => { pdf.addPage(); drawHeader(); };
                const ensureSpace = (n) => { if (curY + n > PH - MB) newPage(); };

                const sectionTitle = (txt) => {
                    ensureSpace(12);
                    pdf.setFillColor(42, 92, 110); pdf.rect(ML, curY, CW, 7, 'F');
                    pdf.setTextColor(255, 255, 255); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9);
                    pdf.text(txt.toUpperCase(), ML + 3, curY + 4.9);
                    pdf.setTextColor(0, 0, 0); curY += 10;
                };
                const fieldRow = (label, value) => {
                    ensureSpace(7);
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(100, 100, 100);
                    pdf.text(label.toUpperCase(), ML, curY + 3.5);
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(20, 20, 20);
                    const lines = pdf.splitTextToSize(value || '—', CW - 60);
                    pdf.text(lines, ML + 58, curY + 3.5);
                    pdf.setDrawColor(225, 225, 225); pdf.line(ML, curY + 6, ML + CW, curY + 6);
                    curY += Math.max(7, lines.length * 4.5 + 2);
                };
                const blockText = (label, value) => {
                    if (label) { ensureSpace(7); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(100, 100, 100); pdf.text(label.toUpperCase(), ML, curY + 3); curY += 5; }
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(30, 30, 30);
                    const lines = pdf.splitTextToSize(value || '—', CW);
                    lines.forEach(line => { ensureSpace(5); pdf.text(line, ML, curY + 3); curY += 4.6; });
                    curY += 2;
                };
                const addFotos = (fotos) => {
                    if (!fotos || !fotos.length) return;
                    ensureSpace(8);
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(100, 100, 100);
                    pdf.text(fotos.length > 1 ? 'FOTOGRAFÍAS' : 'FOTOGRAFÍA', ML, curY + 3); curY += 5;
                    // Una sola foto = a todo el ancho centrada; varias = en grilla de 2 columnas.
                    const cols = fotos.length === 1 ? 1 : 2;
                    const gap = 5;
                    const slotW = (CW - gap * (cols - 1)) / cols;
                    const slotH = cols === 1 ? 95 : 58; // alto fijo del recuadro; la foto se ajusta dentro
                    for (let i = 0; i < fotos.length; i += cols) {
                        const row = fotos.slice(i, i + cols);
                        ensureSpace(slotH + 8);
                        row.forEach((f, k) => {
                            const slotX = ML + k * (slotW + gap);
                            let w, h;
                            try {
                                const pr = pdf.getImageProperties(f);
                                const ratio = pr.width / pr.height;     // sirve para vertical u horizontal
                                w = slotW; h = w / ratio;
                                if (h > slotH) { h = slotH; w = h * ratio; } // que quepa en el recuadro
                            } catch (e) { return; }
                            const x = slotX + (slotW - w) / 2;          // centrado horizontal
                            const y = curY + (slotH - h) / 2;           // centrado vertical
                            try {
                                pdf.addImage(f, imgFormat(f), x, y, w, h);
                                pdf.setDrawColor(210, 210, 210); pdf.setLineWidth(0.3); pdf.rect(x, y, w, h);
                            } catch (e) {}
                            pdf.setFont('helvetica', 'normal'); pdf.setFontSize(6); pdf.setTextColor(120, 120, 120);
                            pdf.text(`Foto ${i + k + 1}`, slotX + slotW / 2, curY + slotH + 3, { align: 'center' });
                        });
                        curY += slotH + 7;
                    }
                    curY += 1;
                };

                // ── HEADER ──
                drawHeader();

                // ── 1. DATOS GENERALES ──
                sectionTitle('1. Datos generales');
                fieldRow('Empresa mandante', data.mandante);
                fieldRow('Empresa ejecutora', data.ejecutora);
                fieldRow('Área / Sector', data.area);
                fieldRow('Fecha de inspección', data.fechaInspeccion);
                const esCphs = MOSTRAR_CPHS_EN_PDF && CPHS_SET.has(data.elaboradoPor);
                fieldRow('Elaborado por', data.elaboradoPor ? (data.elaboradoPor + (esCphs ? ' (CPHS)' : '')) : '');
                curY += 3;

                // ── 2. OBJETIVO ──
                sectionTitle('2. Objetivo');
                blockText('', data.objetivo);
                curY += 3;

                // ── 3. HALLAZGOS ──
                sectionTitle('3. Hallazgos y propuestas de mejora');
                if (data.hallazgos.length === 0) {
                    blockText('', 'Sin hallazgos registrados.');
                } else {
                    data.hallazgos.forEach((h, i) => {
                        ensureSpace(26);
                        pdf.setFillColor(42, 92, 110); pdf.rect(ML, curY, CW, 8, 'F');
                        pdf.setTextColor(255, 255, 255); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9);
                        pdf.text(`HALLAZGO N° ${i + 1}`, ML + 3, curY + 5.4);
                        const ni = nivelInfo(h.nivel);
                        if (ni) {
                            const txt = `RIESGO ${ni.val}`;
                            pdf.setFontSize(7.5);
                            const bw = pdf.getTextWidth(txt) + 6;
                            const c = ni.bg;
                            const r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
                            pdf.setFillColor(r, g, b); pdf.roundedRect(ML + CW - bw - 2, curY + 1.6, bw, 4.8, 1, 1, 'F');
                            pdf.setTextColor(255, 255, 255); pdf.setFont('helvetica', 'bold');
                            pdf.text(txt, ML + CW - bw - 2 + bw / 2, curY + 4.9, { align: 'center' });
                        }
                        pdf.setTextColor(0, 0, 0); curY += 10;
                        fieldRow('Ubicación / Zona', h.ubicacion);
                        blockText('Situación observada', h.situacion);
                        addFotos(h.fotos);
                        blockText('Posible solución propuesta', h.solucion);
                        curY += 3;
                        pdf.setDrawColor(210, 210, 210); pdf.line(ML, curY, ML + CW, curY); curY += 4;
                    });
                }

                // ── 4. OBSERVACIONES Y FIRMA ──
                ensureSpace(60);
                sectionTitle('4. Observaciones generales y firma');
                blockText('', data.observacionesGenerales);
                curY += 6;

                // Firma única del responsable del levantamiento (= quien realizó la inspección)
                ensureSpace(40);
                const fbw = 90;
                const fbx = ML + (CW - fbw) / 2;
                let fy = curY + 2;
                if (data.firma) {
                    try {
                        const pr = pdf.getImageProperties(data.firma);
                        const ratio = pr.width / pr.height;
                        let w = fbw, h = w / ratio;
                        if (h > 24) { h = 24; w = h * ratio; }
                        pdf.addImage(data.firma, imgFormat(data.firma), fbx + (fbw - w) / 2, fy + (24 - h), w, h, undefined, 'FAST');
                    } catch (e) {}
                }
                fy += 26;
                pdf.setDrawColor(42, 92, 110); pdf.setLineWidth(0.5); pdf.line(fbx, fy, fbx + fbw, fy);
                fy += 4;
                const firmaCphs = MOSTRAR_CPHS_EN_PDF && CPHS_SET.has(data.elaboradoPor);
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8.5); pdf.setTextColor(20, 20, 20);
                pdf.text((data.elaboradoPor || 'Responsable del levantamiento') + (firmaCphs ? ' (CPHS)' : ''), fbx + fbw / 2, fy, { align: 'center' });
                fy += 4;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(7); pdf.setTextColor(110, 110, 110);
                pdf.text('Responsable del levantamiento', fbx + fbw / 2, fy, { align: 'center' });
                fy += 3.5;
                pdf.text(data.ejecutora || 'Río Loa S.A.', fbx + fbw / 2, fy, { align: 'center' });

                // ── PIE DE PÁGINA ──
                const total = pdf.internal.getNumberOfPages();
                for (let p = 1; p <= total; p++) {
                    pdf.setPage(p);
                    pdf.setDrawColor(225, 225, 225); pdf.line(ML, PH - 10, PW - MR, PH - 10);
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(6.5); pdf.setTextColor(130, 130, 130);
                    pdf.text(`${data.codigo || ''} · v${data.version || ''} · ${data.ejecutora || 'Río Loa S.A.'}`, ML, PH - 5);
                    pdf.text(`Página ${p} de ${total}`, PW - MR, PH - 5, { align: 'right' });
                }

                const quien = (data.elaboradoPor || 'Responsable').replace(/[\\/:*?"<>|]+/g, ' ').replace(/\s+/g, ' ').trim();
                const fechaF = data.fechaInspeccion ? data.fechaInspeccion.split('-').reverse().join('-') : '';
                return { pdf, filename: `Informe Hallazgos - ${quien}${fechaF ? ' - ' + fechaF : ''}.pdf` };
            };

            const conPDF = (accion) => {
                if (typeof window.jspdf === 'undefined') { alert('Las herramientas aún se están cargando, intenta de nuevo en unos segundos.'); return; }
                setIsGenerating(true);
                try { return accion(buildPDF()); }
                catch (e) { console.error(e); alert('Error con el PDF: ' + (e && e.message)); }
                finally { setIsGenerating(false); }
            };
            const exportarPDF = () => conPDF(({ pdf, filename }) => pdf.save(filename));
            const vistaPrevia = () => conPDF(({ pdf }) => window.open(pdf.output('bloburl'), '_blank'));

            const fechaTxt = () => data.fechaInspeccion ? data.fechaInspeccion.split('-').reverse().join('-') : '';
            const textoMsg = () => {
                const zona = data.area ? ` — ${data.area}` : '';
                const f = fechaTxt() ? ` del ${fechaTxt()}` : '';
                return `Informe de Hallazgos${zona}${f}. ${data.hallazgos.length} hallazgo(s). Adjunto el PDF.`;
            };
            // ENVIAR: comparte el PDF adjunto directamente por el menú nativo del celular.
            const enviarInforme = async () => {
                if (typeof window.jspdf === 'undefined') { alert('Las herramientas aún se están cargando, intenta de nuevo en unos segundos.'); return; }
                setIsGenerating(true);
                let pdf, filename;
                try {
                    const built = buildPDF(); pdf = built.pdf; filename = built.filename;
                    const file = new File([pdf.output('blob')], filename, { type: 'application/pdf' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], title: 'Informe de Hallazgos — Río Loa', text: textoMsg() });
                    } else {
                        pdf.save(filename);
                        alert('Este navegador no permite compartir el PDF automáticamente, así que se descargó.\n\nPara que “ENVIAR” adjunte el PDF solo, abre la app en Chrome y úsala desde el ícono (Chrome: menú ⋮ → Agregar a pantalla de inicio).');
                    }
                } catch (e) {
                    if (e && e.name === 'AbortError') { setIsGenerating(false); return; }
                    console.error(e);
                    try { if (pdf) pdf.save(filename || 'Informe_Hallazgos.pdf'); } catch (x) {}
                    alert('No se pudo compartir automáticamente en este navegador; se descargó el PDF.\n\nÁbrela en Chrome para que se adjunte automáticamente.');
                } finally { setIsGenerating(false); }
            };

            // ─────────── UI helpers ───────────
            const Label = ({ children }) => <label className="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">{children}</label>;
            const inputCls = "w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-sky-200 focus:border-sky-400 outline-none text-base transition";

            // Subir UNA imagen (firma/logo): un solo botón, sin forzar cámara
            const ImageDrop = ({ value, onChange, label, h = "h-24" }) => {
                const recibir = (e) => { const f = e.target.files[0]; if (f) compressImage(f, onChange); e.target.value = ''; };
                if (value) return (
                    <div className="relative inline-block">
                        <img src={value} alt={label} className={`${h} rounded-lg border border-slate-200 object-contain bg-white`} />
                        <button onClick={() => onChange(null)} className="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full p-1 shadow hover:bg-red-600 transition"><XCircle size={16} /></button>
                    </div>
                );
                return (
                    <label className={`${h} w-full max-w-xs border-2 border-dashed border-slate-300 rounded-lg flex flex-col items-center justify-center text-slate-500 cursor-pointer hover:bg-slate-50 hover:border-sky-400 transition`}>
                        <input type="file" accept="image/*" className="hidden" onChange={recibir} />
                        <Upload size={20} />
                        <span className="text-[11px] mt-1 font-bold uppercase">{label || 'Subir imagen'}</span>
                    </label>
                );
            };

            // Varias fotos por hallazgo — UN solo botón (Android ofrece Cámara o Galería)
            const MultiFoto = ({ fotos, onAdd, onRemove }) => {
                const recibir = (e) => { Array.from(e.target.files || []).forEach(f => compressImage(f, onAdd)); e.target.value = ''; };
                return (
                    <div>
                        {fotos.length > 0 && (
                            <div className="grid grid-cols-3 sm:grid-cols-4 gap-2 mb-2">
                                {fotos.map((src, k) => (
                                    <div key={k} className="relative">
                                        <img src={src} alt={`Foto ${k + 1}`} className="w-full h-24 object-cover rounded-lg border border-slate-200" />
                                        <button onClick={() => onRemove(k)} className="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full p-0.5 shadow hover:bg-red-600 transition"><XCircle size={16} /></button>
                                        <span className="absolute bottom-1 left-1 bg-black/60 text-white text-[9px] px-1 rounded">Foto {k + 1}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        {fotos.length < MAX_FOTOS ? (
                            <label className="w-full border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center py-5 cursor-pointer text-slate-500 hover:bg-slate-50 hover:border-sky-400 transition">
                                <input type="file" accept="image/*" multiple className="hidden" onChange={recibir} />
                                <Camera size={28} />
                                <span className="text-sm mt-1 font-bold">Agregar foto</span>
                                <span className="text-[10px] text-slate-400 mt-0.5">Cámara o galería</span>
                            </label>
                        ) : (
                            <p className="text-[11px] text-slate-400 italic">Máximo {MAX_FOTOS} fotos por hallazgo.</p>
                        )}
                    </div>
                );
            };

            // Pad para dibujar la firma con el dedo (celular) o el mouse
            const FirmaPad = ({ value, onChange }) => {
                const ref = useRef(null);
                const drawing = useRef(false);
                const last = useRef(null);
                useEffect(() => {
                    const c = ref.current; const ctx = c.getContext('2d');
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height);
                    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#111827';
                    if (value) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, c.width, c.height); img.src = value; }
                }, []);
                const pt = (e) => { const c = ref.current; const r = c.getBoundingClientRect(); return { x: (e.clientX - r.left) * (c.width / r.width), y: (e.clientY - r.top) * (c.height / r.height) }; };
                const down = (e) => { e.preventDefault(); drawing.current = true; last.current = pt(e); try { e.target.setPointerCapture(e.pointerId); } catch (x) {} };
                const move = (e) => { if (!drawing.current) return; const ctx = ref.current.getContext('2d'); const p = pt(e); ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke(); last.current = p; };
                const up = () => { if (!drawing.current) return; drawing.current = false; onChange(ref.current.toDataURL('image/png')); };
                const clear = () => { const c = ref.current; const ctx = c.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height); onChange(null); };
                return (
                    <div>
                        <canvas ref={ref} width={560} height={190}
                            onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerLeave={up}
                            style={{ width: '100%', maxWidth: '560px', height: '190px', border: '2px dashed #cbd5e1', borderRadius: '12px', background: '#fff', touchAction: 'none', cursor: 'crosshair', display: 'block' }} />
                        <div className="flex items-center gap-3 mt-2">
                            <button onClick={clear} className="text-xs text-slate-500 hover:text-red-500 font-semibold flex items-center gap-1"><RotateCcw size={13} /> Borrar firma</button>
                            <span className="text-[11px] text-slate-400">Dibuja tu firma con el dedo (celular) o el mouse.</span>
                        </div>
                    </div>
                );
            };

            const btnEnviar = (cls) => (
                <button onClick={enviarInforme} disabled={isGenerating} className={cls} style={{ background: isGenerating ? '#94a3b8' : '#16a34a' }}>
                    {isGenerating ? <Loader size={18} className="animate-spin" /> : <Send size={18} />} ENVIAR
                </button>
            );

            return (
                <div className="min-h-screen text-slate-800">
                    {/* Aviso: navegador interno (WhatsApp, etc.) */}
                    {chromeTip && (
                        <div className="bg-amber-100 border-b border-amber-300 text-amber-900 px-4 py-2.5 flex items-center gap-3 text-xs no-print">
                            <span className="font-bold">⚠️ Para usar la cámara, abre esta página en Chrome.</span>
                            <button onClick={copiarEnlace} className="underline font-bold whitespace-nowrap">Copiar enlace</button>
                            <button onClick={() => setChromeTip(false)} className="ml-auto text-amber-700 font-bold text-base leading-none">✕</button>
                        </div>
                    )}

                    {/* ── BARRA SUPERIOR ── */}
                    <header className="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm no-print">
                        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
                            <LogoRioLoa height={30} />
                            <div className="hidden sm:block border-l border-slate-200 pl-3">
                                <div className="text-sm font-black uppercase tracking-tight text-slate-700 leading-none">Informe de Hallazgos</div>
                                <div className="text-[11px] text-slate-400 uppercase tracking-wide">Inspección en Terreno</div>
                            </div>
                            <div className="ml-auto flex items-center gap-2">
                                <button onClick={vistaPrevia} disabled={isGenerating} title="Vista previa" className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-100 transition">
                                    <Eye size={15} /> <span className="hidden sm:inline">Vista previa</span>
                                </button>
                                {btnEnviar("flex items-center gap-1.5 px-5 py-2 rounded-lg text-sm font-black uppercase tracking-wide text-white shadow transition")}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 md:p-6 space-y-5 pb-28">

                        {/* Tamaño de letra */}
                        <div className="flex items-center justify-center gap-2 no-print">
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wide">Tamaño de letra</span>
                            <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                                {ESCALAS.map((e, i) => (
                                    <button key={e.id} onClick={() => setEscalaIdx(i)} title={e.id}
                                        className="rounded-md font-black leading-none transition"
                                        style={{ fontSize: (14 + i * 5) + 'px', padding: '4px 12px', background: escalaIdx === i ? TEAL : 'transparent', color: escalaIdx === i ? '#fff' : '#475569' }}>
                                        A
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 1. Datos de la inspección */}
                        <Section n="1" title="Datos de la inspección">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <Label>Zona / Sector</Label>
                                    <select className={inputCls} value={data.area} onChange={e => set('area', e.target.value)}>
                                        <option value="">Seleccione zona…</option>
                                        {ZONAS.map(z => <option key={z} value={z}>{z}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <Label>Realizado por</Label>
                                    <select className={inputCls} value={data.elaboradoPor} onChange={e => set('elaboradoPor', e.target.value)}>
                                        <option value="">Seleccione…</option>
                                        {EQUIPO.map(g => (
                                            <optgroup key={g.grupo} label={g.grupo}>
                                                {g.personas.map(p => <option key={p.n} value={p.n}>{p.r ? `${p.n} — ${p.r}` : p.n}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <Label>Fecha de la inspección</Label>
                                    <input type="date" className={inputCls} value={data.fechaInspeccion} onChange={e => set('fechaInspeccion', e.target.value)} />
                                </div>
                            </div>
                        </Section>

                        {/* 2. Hallazgos */}
                        <Section n="2" title="Hallazgos"
                            right={<button onClick={addHallazgo} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold text-white shadow-sm transition" style={{ background: TEAL }}><Plus size={15} /> Agregar</button>}>
                            {data.hallazgos.length === 0 && (
                                <div className="text-center py-10 text-slate-400">
                                    <Camera size={32} className="mx-auto mb-2 opacity-50" />
                                    <p className="text-sm font-semibold">Aún no hay hallazgos.</p>
                                    <p className="text-xs">Toca “Agregar” para registrar el primero.</p>
                                </div>
                            )}
                            <div className="space-y-5">
                                {data.hallazgos.map((h, i) => {
                                    const ni = nivelInfo(h.nivel);
                                    return (
                                        <div key={h.id} className="rounded-xl border-2 overflow-hidden" style={{ borderColor: ni ? ni.border : '#e2e8f0' }}>
                                            <div className="flex items-center justify-between px-4 py-2.5" style={{ background: ni ? ni.soft : '#f8fafc' }}>
                                                <span className="font-black text-sm uppercase tracking-tight" style={{ color: TEAL }}>Hallazgo N° {i + 1}</span>
                                                <div className="flex items-center gap-1">
                                                    <button onClick={() => moveHallazgo(h.id, -1)} disabled={i === 0} className="text-slate-400 hover:text-slate-700 disabled:opacity-30 px-1" title="Subir">▲</button>
                                                    <button onClick={() => moveHallazgo(h.id, 1)} disabled={i === data.hallazgos.length - 1} className="text-slate-400 hover:text-slate-700 disabled:opacity-30 px-1" title="Bajar">▼</button>
                                                    <button onClick={() => delHallazgo(h.id)} className="text-slate-400 hover:text-red-500 ml-1"><Trash2 size={16} /></button>
                                                </div>
                                            </div>
                                            <div className="p-4 space-y-4 bg-white">
                                                <div>
                                                    <Label>Nivel de riesgo</Label>
                                                    <div className="flex gap-2">
                                                        {NIVELES.map(n => (
                                                            <button key={n.val} onClick={() => updHallazgo(h.id, 'nivel', h.nivel === n.val ? '' : n.val)}
                                                                className="flex-1 px-3 py-2.5 rounded-lg text-sm font-black uppercase tracking-wide border-2 transition"
                                                                style={h.nivel === n.val
                                                                    ? { background: n.bg, color: '#fff', borderColor: n.bg }
                                                                    : { background: '#fff', color: n.text, borderColor: n.border }}>
                                                                {n.val}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div><Label>¿Dónde? (ubicación específica)</Label><input lang="es" spellCheck={true} className={inputCls} value={h.ubicacion} onChange={e => updHallazgo(h.id, 'ubicacion', e.target.value)} placeholder="Ej: costado chute de conchuela" /></div>
                                                <div><Label>¿Qué se observó?</Label><textarea lang="es" spellCheck={true} className={`${inputCls} h-24`} value={h.situacion} onChange={e => updHallazgo(h.id, 'situacion', e.target.value)} placeholder="Describe la condición observada..." /></div>
                                                <div><Label>Fotos ({(h.fotos || []).length})</Label><MultiFoto fotos={h.fotos || []} onAdd={v => addFotoHallazgo(h.id, v)} onRemove={k => delFotoHallazgo(h.id, k)} /></div>
                                                <div><Label>¿Qué se propone?</Label><textarea lang="es" spellCheck={true} className={`${inputCls} h-20`} value={h.solucion} onChange={e => updHallazgo(h.id, 'solucion', e.target.value)} placeholder="Solución o mejora propuesta..." /></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </Section>

                        {/* 3. Observaciones y firma */}
                        <Section n="3" title="Observaciones y firma">
                            <Label>Observaciones generales</Label>
                            <textarea lang="es" spellCheck={true} className={`${inputCls} h-28 mb-6`} value={data.observacionesGenerales} onChange={e => set('observacionesGenerales', e.target.value)} placeholder="Resumen general y recomendaciones (opcional)..." />
                            <div className="bg-slate-50 rounded-xl border border-slate-200 p-4">
                                <p className="text-xs font-black uppercase tracking-tight mb-1" style={{ color: TEAL }}>Firma del responsable del levantamiento</p>
                                {data.elaboradoPor
                                    ? <p className="text-sm text-slate-700 mb-3"><b>{data.elaboradoPor}</b>{CPHS_SET.has(data.elaboradoPor) ? ' (CPHS)' : ''} — {data.ejecutora}</p>
                                    : <p className="text-sm text-amber-700 font-semibold mb-3">↑ Primero selecciona quién realiza la inspección en “Realizado por”.</p>}
                                <FirmaPad value={data.firma} onChange={v => set('firma', v)} />
                            </div>
                        </Section>

                        {/* Botón grande ENVIAR */}
                        {btnEnviar("w-full flex items-center justify-center gap-2 py-4 rounded-xl text-base font-black uppercase tracking-wide text-white shadow-lg transition")}

                        {/* Acciones secundarias */}
                        <div className="flex items-center justify-center gap-5 pt-1 text-xs">
                            <span className="flex items-center gap-1 text-emerald-600 font-semibold"><Save size={13} /> {saveNote}</span>
                            <button onClick={revisarOrtografia} className="flex items-center gap-1 text-amber-700 font-semibold hover:underline"><SpellCheck size={14} /> Revisar ortografía</button>
                            <button onClick={exportarPDF} className="flex items-center gap-1 text-slate-500 font-semibold hover:underline"><Download size={14} /> Descargar PDF</button>
                        </div>

                        {/* Ajustes (opcional) */}
                        <div className="pt-2">
                            <button onClick={() => setAjustesOpen(o => !o)} className="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-700 font-semibold mx-auto"><Settings size={13} /> Ajustes del documento {ajustesOpen ? '▲' : '▼'}</button>
                            {ajustesOpen && (
                                <div className="mt-3 bg-white rounded-xl border border-slate-200 shadow-sm p-5 space-y-4">
                                    <p className="text-[11px] text-slate-400">Solo para administración — normalmente no hace falta tocar nada aquí.</p>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        <div><Label>Código</Label><input className={inputCls} value={data.codigo} onChange={e => set('codigo', e.target.value)} /></div>
                                        <div><Label>Versión</Label><input className={inputCls} value={data.version} onChange={e => set('version', e.target.value)} /></div>
                                        <div className="col-span-2"><Label>Fecha documento</Label><input className={inputCls} value={data.fechaDoc} onChange={e => set('fechaDoc', e.target.value)} /></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div><Label>Empresa mandante</Label><input className={inputCls} value={data.mandante} onChange={e => set('mandante', e.target.value)} /></div>
                                        <div><Label>Empresa ejecutora</Label><input className={inputCls} value={data.ejecutora} onChange={e => set('ejecutora', e.target.value)} /></div>
                                    </div>
                                    <div><Label>Objetivo</Label><textarea className={`${inputCls} h-20`} value={data.objetivo} onChange={e => set('objetivo', e.target.value)} /></div>
                                    <div>
                                        <Label>Logo</Label>
                                        {data.logo
                                            ? <div className="flex items-center gap-2"><img src={data.logo} className="h-8 object-contain" /><button onClick={() => set('logo', null)} className="text-[11px] text-slate-400 hover:text-red-500 underline">quitar (usar logo por defecto)</button></div>
                                            : <div className="flex items-center gap-2"><LogoRioLoa height={24} /><label className="text-[11px] text-sky-600 hover:underline cursor-pointer flex items-center gap-1"><Upload size={12} /> reemplazar<input type="file" accept="image/*" className="hidden" onChange={e => { const f = e.target.files[0]; if (f) fileToDataURL(f, v => set('logo', v)); }} /></label></div>}
                                    </div>
                                    <div className="pt-2 border-t border-slate-100">
                                        <button onClick={limpiarTodo} className="flex items-center gap-1.5 text-xs text-red-400 hover:text-red-600 font-semibold"><RotateCcw size={13} /> Limpiar todo el informe</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* ── PANEL CORRECTOR ORTOGRÁFICO ── */}
                    {spellOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end no-print">
                            <div className="absolute inset-0 bg-black/30" onClick={() => setSpellOpen(false)} />
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col">
                                <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200" style={{ background: '#fffbeb' }}>
                                    <div className="flex items-center gap-2"><SpellCheck size={20} className="text-amber-600" /><h3 className="font-black uppercase tracking-tight text-amber-800">Corrector ortográfico</h3></div>
                                    <button onClick={() => setSpellOpen(false)} className="text-slate-400 hover:text-slate-700"><XCircle size={22} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5">
                                    {spellStatus === 'loading' && <div className="flex flex-col items-center justify-center py-16 text-slate-500"><Loader size={28} className="animate-spin mb-3" /><p className="text-sm font-semibold">Cargando diccionario en español…</p><p className="text-xs text-slate-400 mt-1">Solo la primera vez.</p></div>}
                                    {spellStatus === 'error' && <div className="bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-700">No se pudo cargar el diccionario (¿sin conexión?). Igualmente el navegador subraya en rojo las palabras dudosas mientras escribes.</div>}
                                    {spellStatus === 'ready' && spellResults && spellResults.total === 0 && (
                                        <div className="flex flex-col items-center justify-center py-16 text-emerald-600"><div className="bg-emerald-50 rounded-full p-4 mb-3"><Check size={32} /></div><p className="font-bold">Sin errores detectados</p><p className="text-xs text-slate-400 mt-1">No se encontraron palabras dudosas.</p></div>
                                    )}
                                    {spellStatus === 'ready' && spellResults && spellResults.total > 0 && (
                                        <div className="space-y-5">
                                            <p className="text-xs text-slate-500">Se detectaron <b className="text-amber-700">{spellResults.total}</b> palabra(s) dudosa(s). Toca una sugerencia para corregir.</p>
                                            {spellResults.campos.map(c => (
                                                <div key={c.id} className="border border-slate-200 rounded-lg overflow-hidden">
                                                    <div className="bg-slate-50 px-3 py-2 text-[11px] font-bold uppercase tracking-wide text-slate-500">{c.label}</div>
                                                    <div className="p-3 space-y-3">
                                                        {c.issues.map((it, k) => (
                                                            <div key={k} className="flex flex-wrap items-center gap-2">
                                                                <span className="px-2 py-0.5 rounded bg-red-50 text-red-600 text-sm font-bold line-through decoration-red-400">{it.word}</span>
                                                                <span className="text-slate-300">→</span>
                                                                {it.suggestions.length === 0 && <span className="text-xs text-slate-400 italic">sin sugerencias</span>}
                                                                {it.suggestions.map((s, si) => (
                                                                    <button key={si} onClick={() => aplicarCorreccion(c, it.word, s)} className="px-2 py-0.5 rounded bg-emerald-50 text-emerald-700 text-sm font-semibold border border-emerald-200 hover:bg-emerald-100 transition">{s}</button>
                                                                ))}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="border-t border-slate-200 p-4">
                                    <button onClick={revisarOrtografia} className="w-full py-2.5 rounded-lg text-sm font-bold text-white transition" style={{ background: TEAL }}>Volver a revisar</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        // Sección reutilizable
        const Section = ({ n, title, right, children }) => (
            <section className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100">
                    <h2 className="flex items-center gap-2 font-black uppercase tracking-tight text-slate-700">
                        <span className="flex items-center justify-center w-6 h-6 rounded-md text-white text-xs" style={{ background: '#2A5C6E' }}>{n}</span>
                        {title}
                    </h2>
                    {right}
                </div>
                <div className="p-5">{children}</div>
            </section>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- Bootstrap: compila el JSX con runtime clásico (evita los import del runtime automático) -->
    <script>
        (function () {
            try {
                var src = document.getElementById('app-source').textContent;
                var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
                (0, eval)(out);
            } catch (e) {
                console.error(e);
                document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">Error al iniciar la app: ' + (e && e.message) + '</div>';
            }
        })();
    </script>
</body>
</html>
